name: Build and Publish Kyma Docs Index

on:
  schedule:
    - cron: "0 9 * * 6"  # Every Saturday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  ROLLING_RELEASE_TAG: "docs-index-latest"
  EMBED_MODEL: "BAAI/bge-base-en-v1.5"

jobs:
  build-index:
    name: Build ChromaDB index and publish to rolling release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Ensure rolling release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ env.ROLLING_RELEASE_TAG }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            gh release create "${{ env.ROLLING_RELEASE_TAG }}" \
              --repo "${{ github.repository }}" \
              --title "Latest Kyma Docs Index" \
              --notes "Auto-updated weekly. Contains the latest ChromaDB index of Kyma documentation." \
              --prerelease
          fi

      - name: Check for new and drifted doc sources, open PR if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/check_missing_sources.py --auto-add
          DRIFT=$(uv run python scripts/check_source_drift.py --auto-fix 2>&1)
          echo "$DRIFT"

          if git diff --quiet kyma_knowledge_mcp/indexing/docs_sources.json; then
            echo "No changes to docs_sources.json — nothing to PR."
            exit 0
          fi

          BRANCH="chore/doc-sources-update-$(date +%Y%m%d)"

          if gh pr list --state open --json headRefName \
               --jq '[.[].headRefName | select(startswith("chore/doc-sources-update"))] | length' \
               | grep -qv '^0$'; then
            echo "A doc sources update PR is already open. Skipping PR creation."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git add kyma_knowledge_mcp/indexing/docs_sources.json
          git commit -m "chore: auto-update doc sources (new repos + drift fixes)"
          git push --force-with-lease origin "$BRANCH"

          {
            echo "This PR was auto-generated by the weekly index build workflow."
            echo ""
            echo "Both new repo discovery and drift detection ran and applied conservative fixes to \`docs_sources.json\`."
            echo ""
            echo "**Review the diff**, then use \`/triage-kyma-doc-sources\` to:"
            echo "- Remove internal tooling repos"
            echo "- Adjust \`include_files\` patterns"
            echo "- Confirm correct \`collection\` (user/contributor)"
            echo ""
            if echo "$DRIFT" | grep -qE "NEW_PATH|DEAD|MISSING_DEV"; then
              echo "## Drift findings (auto-applied)"
              echo ""
              echo "\`\`\`"
              echo "$DRIFT"
              echo "\`\`\`"
            fi
          } > /tmp/pr-body.txt

          gh pr create \
              --title "chore: add newly discovered Kyma docs" \
            --body-file /tmp/pr-body.txt \
            --base main \
            --head "$BRANCH"

      - name: Fetch and index Kyma documentation
        run: |
          uv run kyma-knowledge-mcp-build-index \
            --sources kyma_knowledge_mcp/indexing/docs_sources.json \
            --data-dir ./data \
            --tmp-dir ./tmp \
            --output-dir ./chroma_index \
            --embed-model "${{ env.EMBED_MODEL }}" \
            --package kyma-docs-index.tar.gz \
            --log-level INFO

      - name: Upload index to rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.ROLLING_RELEASE_TAG }}" kyma-docs-index.tar.gz --clobber
