name: Build and Publish Kyma Docs Index

on:
  schedule:
    - cron: "0 9 * * 6"  # Every Saturday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  ROLLING_RELEASE_TAG: "docs-index-latest"
  EMBED_MODEL: "BAAI/bge-base-en-v1.5"

jobs:
  build-index:
    name: Build ChromaDB index and publish to rolling release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Ensure rolling release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ env.ROLLING_RELEASE_TAG }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            gh release create "${{ env.ROLLING_RELEASE_TAG }}" \
              --repo "${{ github.repository }}" \
              --title "Latest Kyma Docs Index" \
              --notes "Auto-updated weekly. Contains the latest ChromaDB index of Kyma documentation." \
              --prerelease
          fi

      - name: Auto-add missing doc sources and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/check_missing_sources.py --auto-add
          if git diff --quiet kyma_knowledge_mcp/indexing/docs_sources.json; then
            echo "No new sources found."
          else
            BRANCH="chore/auto-add-doc-sources-$(date +%Y%m%d)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add kyma_knowledge_mcp/indexing/docs_sources.json
            git commit -m "chore: auto-add newly discovered Kyma doc sources"
            git push origin "$BRANCH"
            printf '%s\n' \
              "This PR was auto-generated by the weekly index build workflow." \
              "" \
              "New Kyma repos with documentation were found that are not yet in \`docs_sources.json\`." \
              "They have been added with conservative \`include_files\` patterns." \
              "" \
              "**Please review each entry and adjust the \`include_files\` list** to include only" \
              "the files relevant to users (e.g. remove release notes, internal contributor docs)." \
              "" \
              "Then rebuild the index to pick up the new content." \
              > /tmp/pr-body.txt
            gh pr create \
              --title "chore: add newly discovered Kyma doc sources" \
              --body-file /tmp/pr-body.txt \
              --base main \
              --head "$BRANCH"
          fi

      - name: Fetch and index Kyma documentation
        run: |
          uv run kyma-knowledge-mcp-build-index \
            --sources kyma_knowledge_mcp/indexing/docs_sources.json \
            --data-dir ./data \
            --tmp-dir ./tmp \
            --output-dir ./chroma_index \
            --embed-model "${{ env.EMBED_MODEL }}" \
            --package kyma-docs-index.tar.gz \
            --log-level INFO

      - name: Upload index to rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.ROLLING_RELEASE_TAG }}" kyma-docs-index.tar.gz --clobber
