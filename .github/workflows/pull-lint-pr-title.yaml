name: Lint PR Title
run-name: ${{github.event.pull_request.title}}

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions: read-all

jobs:
  check:
    name: Check Title
    runs-on: ubuntu-latest
    permissions:
      actions: none
    steps:
      - uses: amannn/action-semantic-pull-request@45b9ed7cf24087a2f7785bf55be97394ba87e1c2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            deps
            chore
            docs
            feat
            fix
            refactor
            test
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
