name: MCP Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed for gh-pages push on main
  pages: write
  id-token: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group eval

      - name: Run eval
        env:
          # GH_MODELS_TOKEN must be a PAT with the 'models' permission scope.
          # secrets.GITHUB_TOKEN alone does not have that scope.
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          # --workers 1: sequential execution avoids bursting past GitHub Models 15 RPM limit.
          # On PRs run only condition C (MCP) to stay within the 150 req/day free-tier budget.
          # On main pushes run all conditions so the GitHub Pages report shows A/B/C comparison.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            EXTRA_FLAGS="--conditions mcp"
          else
            EXTRA_FLAGS=""
          fi
          uv run python -m tests.eval.run_eval \
            --agent github-models \
            --workers 1 \
            --save-results \
            --report both \
            $EXTRA_FLAGS


      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: tests/eval/results/

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/eval-report
          destination_dir: eval-report
